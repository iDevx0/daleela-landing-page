  <style>
    :root {
      --mb-header-height: 74px;
      --text-primary: rgb(88, 88, 88);
      --text-secondary: rgb(153, 153, 153);
      --bg-primary: rgb(255, 254, 253);
      --bg-white: rgb(255, 255, 255);
      --accent-pink: #61313f;
      --accent-pink-dark: #4e2733;
      --accent-light: #f3e6ea;
      --accent-teal: #507a7c;
      --accent-teal-light: #e2f5f6;
      --accent-teal-border: #5ca4a9;
      --border-color: rgba(0, 0, 0, 0.08);
      --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.04);
      --shadow-md: 0 4px 16px rgba(0, 0, 0, 0.08);
      --max-width: 1200px;
      --card-max-width: 720px;
      --ease-care: cubic-bezier(0.22, 1, 0.36, 1);
    }

    @keyframes cinematic-wash-out {
      0% { opacity: 1; }
      85% { opacity: 0; }
      100% { opacity: 0; visibility: hidden; }
    }

    @keyframes care-reveal {
      from {
        opacity: 0;
        transform: translateY(26px);
        filter: blur(8px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
        filter: blur(0);
      }
    }

    @keyframes care-reveal-header {
      from {
        opacity: 0;
        transform: translateY(-10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes care-reveal-soft {
      from {
        opacity: 0;
        transform: translateY(20px) scale(0.97);
        filter: blur(6px);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
        filter: blur(0);
      }
    }

    @keyframes ambient-float {
      from { transform: translate(0, 0) scale(1); }
      to { transform: translate(18px, 14px) scale(1.06); }
    }

    @keyframes ambient-float-alt {
      from { transform: translate(0, 0) scale(1); }
      to { transform: translate(-14px, 10px) scale(1.05); }
    }

    .cinematic-wash {
      position: fixed;
      inset: 0;
      z-index: 200;
      pointer-events: none;
      background:
        radial-gradient(ellipse 80% 60% at 50% 20%, rgba(243, 230, 234, 0.55) 0%, transparent 70%),
        radial-gradient(ellipse 60% 50% at 20% 80%, rgba(253, 248, 243, 0.45) 0%, transparent 65%),
        linear-gradient(180deg, rgba(255, 254, 253, 0.92) 0%, rgba(255, 254, 253, 0.4) 100%);
      animation: cinematic-wash-out 2.2s var(--ease-care) forwards;
    }

    .reveal {
      opacity: 0;
      animation: care-reveal 1.15s var(--ease-care) forwards;
    }

    .hero-lead.reveal {
      opacity: 0;
      animation-name: care-reveal-lead;
    }

    @keyframes care-reveal-lead {
      from {
        opacity: 0;
        transform: translateY(26px);
        filter: blur(8px);
      }
      to {
        opacity: 0.92;
        transform: translateY(0);
        filter: blur(0);
      }
    }

    .reveal-header {
      animation-name: care-reveal-header;
      animation-duration: 0.95s;
    }

    .reveal-soft {
      animation-name: care-reveal-soft;
    }

    .reveal-d1 { animation-delay: 0.2s; }
    .reveal-d2 { animation-delay: 0.42s; }
    .reveal-d3 { animation-delay: 0.64s; }
    .reveal-d4 { animation-delay: 0.88s; }
    .reveal-d5 { animation-delay: 1.1s; }

    @media (prefers-reduced-motion: reduce) {
      .cinematic-wash,
      .partnership-hero::before,
      .partnership-hero::after {
        animation: none !important;
        opacity: 0 !important;
        visibility: hidden !important;
      }

      .reveal,
      .reveal-header,
      .reveal-soft,
      .hero-lead.reveal {
        animation: none !important;
        opacity: 1 !important;
        filter: none !important;
        transform: none !important;
      }

      .hero-lead {
        opacity: 0.92 !important;
      }
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;

    body {

      line-height: 1.5;
      min-height: 100vh;
      display: flex;
      flex-direction: column;

      text-decoration: none;
    }

    svg {
      display: block;

    .header {

      top: 0;
      z-index: 100;
      background: var(--bg-white);
      border-bottom: 1px solid var(--border-color);
      height: var(--mb-header-height);

    .header-container {

      align-items: center;

      border-radius: 8px;

      font-size: 14px;
      color: var(--text-primary);
      background: transparent;
      border: 1px solid var(--border-color);

      transition: background 0.2s ease, color 0.2s ease;
      font-family: inherit;

    .lang-switch:hover {

    .partnership-hero {
      position: relative;
      overflow: hidden;
      background: linear-gradient(180deg, #fff 0%, #fdf8f3 45%, var(--bg-primary) 100%);
      padding: 40px 20px 28px;
      border-bottom: 1px solid var(--border-color);
    }

    .partnership-hero::before,
    .partnership-hero::after {
      content: '';
      position: absolute;
      border-radius: 50%;
      pointer-events: none;
      z-index: 0;
    }

    .partnership-hero::before {
      top: -35%;
      inset-inline-end: -8%;
      width: min(420px, 70vw);
      height: min(420px, 70vw);
      background: radial-gradient(circle, rgba(243, 230, 234, 0.75) 0%, transparent 68%);
      animation: ambient-float 10s ease-in-out infinite alternate;
    }

    .partnership-hero::after {
      bottom: -40%;
      inset-inline-start: -12%;
      width: min(360px, 65vw);
      height: min(360px, 65vw);
      background: radial-gradient(circle, rgba(226, 245, 246, 0.55) 0%, transparent 70%);
      animation: ambient-float-alt 12s ease-in-out infinite alternate;
    }

    .partnership-inner {
      position: relative;
      z-index: 1;
      max-width: var(--card-max-width);
      margin: 0 auto;
      text-align: center;
    }

    .partner-logo-row {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0;
      flex-wrap: nowrap;
      margin-bottom: 28px;
      padding: 10px 14px;
      background: #fff;
      border: 1px solid rgba(97, 49, 63, 0.1);
      border-radius: 16px;
      box-shadow: 0 4px 20px rgba(97, 49, 63, 0.08);

      justify-content: center;
      width: 132px;
      height: 40px;
      flex-shrink: 0;
    }

    .partner-logo-link {
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-primary);
      width: 100%;
      height: 100%;

    .partner-logo-link:hover {

    .partner-logo-link svg {

      height: auto;

    .partner-logo-img {

      font-weight: 800;
      line-height: 1.35;
      color: #222;
      margin-bottom: 14px;
      max-width: 640px;

    .main {

      display: flex;
      align-items: flex-start;
      justify-content: center;

    }

    .page-shell {

    .section-label {

      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: var(--accent-pink);

    }

    .card {

      background: var(--bg-white);
      border-radius: 24px;
      box-shadow: var(--shadow-md);
      border: 1px solid var(--border-color);
      padding: 28px 24px 24px;
    }

    .gift-badge {
      display: none;
    }

    .card h2 {
      font-size: clamp(20px, 3.5vw, 24px);
      font-weight: 800;
      line-height: 1.35;
      color: #222;
      margin-bottom: 8px;
    }

    .subtitle {
      color: var(--text-secondary);
      font-size: 15px;
      line-height: 1.6;
      margin-bottom: 24px;
    }

    .option-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-bottom: 20px;
    }

    .option-item {
      background: #f2f2f2;
      border: 2px solid #f2f2f2;
      border-radius: 16px;
      padding: 16px;
      cursor: pointer;
      transition: all 0.25s ease;
      display: flex;
      align-items: center;
      gap: 14px;
      text-align: start;
    }

    .option-item:hover {
      background: var(--accent-teal-light);
      border-color: var(--accent-teal-border);
      transform: translateY(-1px);
      box-shadow: 0 4px 16px rgba(80, 122, 124, 0.12);
    }

    .option-item.selected {
      background: var(--accent-teal-light);
      border-color: var(--accent-teal-border);
      box-shadow: 0 4px 20px rgba(80, 122, 124, 0.16);
    }

    .option-icon {
      width: 52px;
      height: 52px;
      border-radius: 14px;
      background: var(--bg-white);
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: var(--shadow-sm);
    }

    .option-item.selected .option-icon {
      background: #d5eff1;
    }

    .option-icon svg {
      width: 36px;
      height: 36px;
    }

    .option-text {
      flex: 1;
      min-width: 0;
    }

    .option-title-row {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 4px;
    }

    .option-title {
      font-size: 15px;
      font-weight: 700;
      color: #222;
      line-height: 1.35;
    }

    .free-tag {
      display: inline-flex;
      align-items: center;
      background: var(--accent-pink);
      color: #fff;
      font-size: 10px;
      font-weight: 700;
      border-radius: 6px;
      padding: 2px 8px;
      letter-spacing: 0.03em;
      text-transform: uppercase;
    }

    .option-desc {
      font-size: 13px;
      color: var(--text-secondary);
      line-height: 1.45;
    }

    .checkbox-btn {
      width: 22px;
      height: 22px;
      border: 2px solid #d2d2d2;
      border-radius: 50%;
      flex-shrink: 0;
      position: relative;
      transition: all 0.25s ease;
    }

    .option-item.selected .checkbox-btn {
      background: var(--accent-teal);
      border-color: var(--accent-teal);
    }

    .option-item.selected .checkbox-btn::after {
      content: '✓';
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: #fff;
      font-size: 12px;
      font-weight: 700;
    }

    .btn {
      width: 100%;
      padding: 16px 24px;
      border: none;
      border-radius: 14px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s ease;
      font-family: inherit;
      background: var(--accent-pink);
      color: #fff;
    }

    .btn:hover:not(:disabled) {
      background: var(--accent-pink-dark);
    }

    .btn:disabled {
      background: rgba(97, 49, 63, 0.35);
      cursor: not-allowed;
    }

    .footer {
      background: #fef9e7;
      padding: 56px 0 48px;
      margin-top: auto;
      border-top: 1px solid var(--border-color);
    }

    .footer-wrapper {
      position: relative;
      z-index: 2;
    }

    .footer-top {
      max-width: var(--max-width);
      margin: 0 auto;
      padding: 0 24px 32px;
      border-bottom: 1px solid rgba(0, 0, 0, 0.06);
    }

    .footer-logo-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 20px;
    }

    .footer-logo {
      width: 44px;
      margin: 0 auto 16px;
    }

    .footer-logo-svg {
      width: 100%;
      height: auto;
      fill: var(--text-primary);
    }

    .footer-tagline {
      font-size: 14px;
      line-height: 1.65;
      color: var(--text-secondary);
      text-align: center;
      max-width: 440px;
      margin: 0 auto 24px;
    }

    .footer-social-links {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 20px;
      margin-bottom: 28px;
    }

    .footer-social-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.25s ease;
    }

    .footer-social-link:hover {
      transform: scale(1.08);
    }

    .footer-social-icon {
      width: 24px;
      height: 24px;
    }

    .footer-social-instagram { color: #CF2B5A; }
    .footer-social-tiktok { color: #1D4B9F; }
    .footer-social-facebook { color: #1D4B9F; }

    .footer-app-buttons {
      display: flex;
      flex-direction: column;
      gap: 10px;
      justify-content: center;
      align-items: center;
    }

    @media (min-width: 640px) {
      .footer-app-buttons {
        flex-direction: row;
        gap: 12px;
      }
    }

    .footer-app-button {
      display: flex;
      min-width: 190px;
      padding: 12px 24px;
      background: var(--bg-white);
      color: var(--text-primary);
      border-radius: 12px;
      align-items: center;
      justify-content: center;
      transition: transform 0.25s ease;
      text-decoration: none;
      box-shadow: var(--shadow-sm);
    }

    .footer-app-button:hover {
      transform: scale(0.97);
    }

    .footer-app-icon {
      margin-inline-start: 14px;
    }

    .footer-app-icon-svg {
      width: 26px;
      height: auto;
    }

    .footer-app-text {
      text-align: end;
    }

    .footer-app-label {
      font-size: 11px;
      font-weight: 500;
      color: var(--text-secondary);
    }

    .footer-app-name {
      font-size: 15px;
      font-weight: 600;
      font-family: 'Vazirmatn', sans-serif;
      margin-top: -4px;
    }

    .footer-bottom {
      max-width: var(--max-width);
      margin: 0 auto;
      padding: 24px 24px 0;
    }

    .footer-bottom-content {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
    }

    @media (min-width: 769px) {
      .footer-bottom-content {
        flex-direction: row;
        justify-content: space-between;
        align-items: center;
      }

      .footer-links {
        display: flex;
        flex-direction: row;
        align-items: center;
        gap: 10px;
      }
    }

    .footer-copyright p {

      font-weight: 500;
      color: var(--text-primary);
      margin: 0;
      text-align: center;
    }

    .footer-links {
      display: flex;
      flex-direction: row;
      flex-wrap: wrap;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    .footer-link {
      position: relative;
      padding-bottom: 1px;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-primary);
      text-decoration: none;
      transition: color 0.25s ease;
    }

    .footer-link:hover {
      color: var(--accent-pink-dark);
    }

    .footer-link::after {
      content: '';
      position: absolute;
      bottom: 0;
      inset-inline-start: 0;
      width: 0;
      height: 1px;
      background: var(--accent-pink-dark);
      transition: width 0.25s ease;
    }

    .footer-link:hover::after {
      width: 100%;
    }

    .footer-link-separator {
      font-size: 13px;
      color: rgba(0, 0, 0, 0.12);
    }

    [dir="ltr"] .footer-app-icon {
      margin-inline-start: 0;
      margin-inline-end: 14px;
    }

    [dir="ltr"] .footer-app-text {
      text-align: start;
    }

    [dir="ltr"] .hero-title,
    [dir="ltr"] .hero-lead,
    [dir="ltr"] .partnership-inner {
      text-align: center;
    }

    [dir="ltr"] .option-list,
    [dir="ltr"] .option-item,
    [dir="ltr"] .option-text {
      text-align: left;
    }

    @media (max-width: 480px) {
      .partnership-hero {
        padding: 28px 16px 22px;
      }

      .partner-logo-row {
        padding: 8px 10px;
        border-radius: 14px;
      }

      .partner-logo-slot {
        width: 108px;
        height: 36px;
      }

      .partner-logo-slot--novo {
        width: 118px;
        height: 38px;
      }

      .partner-logo-link svg {
        width: 96px;
        max-height: 26px;
      }

      .partner-logo-img {
        max-width: 108px;
        height: 30px;
      }

      .partner-divider {
        height: 22px;
        margin: 0 4px;
      }

      .card {
        padding: 22px 16px 18px;
        border-radius: 20px;
      }

      .option-item {
        padding: 14px;
      }
    }

    let selectedChoice = null;
    let lang = 'ar';

    function resolveLang() {
      const params = new URLSearchParams(window.location.search);
      const fromQuery = params.get('lang');
      if (fromQuery === 'en' || fromQuery === 'ar') return fromQuery;
      const stored = localStorage.getItem('daleela_free_consult_lang');
      if (stored === 'en' || stored === 'ar') return stored;
      return 'ar';
    }

    function applyLang(nextLang) {
      lang = nextLang;
      localStorage.setItem('daleela_free_consult_lang', lang);

      const t = i18n[lang];
      const html = document.documentElement;
      html.lang = lang;
      html.dir = lang === 'ar' ? 'rtl' : 'ltr';
      document.title = t.pageTitle;

      document.getElementById('hero-title').textContent = t.heroTitle;
      document.getElementById('novo-logo').alt = t.novoLogoAlt;
      document.getElementById('hero-lead').textContent = t.heroLead;
      document.getElementById('section-label').textContent = t.sectionLabel;
      document.getElementById('selection-title').textContent = t.selectionTitle;
      document.getElementById('page-subtitle').textContent = t.subtitle;
      document.getElementById('opt-nutrition-title').textContent = t.nutritionTitle;
      document.getElementById('opt-nutrition-desc').textContent = t.nutritionDesc;
      document.getElementById('opt-injection-title').textContent = t.injectionTitle;
      document.getElementById('opt-injection-desc').textContent = t.injectionDesc;
      document.getElementById('free-tag-1').textContent = t.freeTag;
      document.getElementById('free-tag-2').textContent = t.freeTag;
      document.getElementById('continue-btn').textContent = t.continueBtn;
      document.getElementById('lang-toggle').textContent = t.langToggle;
      document.getElementById('footer-copy').textContent = t.footerCopy;
      document.getElementById('footer-tagline').textContent = t.footerTagline;
      document.getElementById('footer-app-label-ios').textContent = t.footerAppIos;
      document.getElementById('footer-app-label-android').textContent = t.footerAppAndroid;
      document.getElementById('footer-logo-link').href = t.homeHref;
      document.getElementById('header-logo-link').href = t.homeHref;
      document.getElementById('hero-logo-link').href = t.homeHref;
      document.getElementById('faq-link').textContent = t.faq;
      document.getElementById('faq-link').href = t.faqHref;
      document.getElementById('terms-link').textContent = t.terms;
      document.getElementById('terms-link').href = t.termsHref;
      document.getElementById('privacy-link').textContent = t.privacy;
      document.getElementById('privacy-link').href = t.privacyHref;
    }

    function selectChoice(choice) {
      selectedChoice = choice;
      document.querySelectorAll('.option-item').forEach(function (item) {
        const isSelected = item.getAttribute('data-choice') === choice;
        item.classList.toggle('selected', isSelected);
        item.setAttribute('aria-pressed', isSelected ? 'true' : 'false');
      });
      document.getElementById('continue-btn').disabled = false;
    }

    function handleContinue() {
      if (!selectedChoice) return;
      window.location.href = getRedirectUrl(selectedChoice, lang);
    }

    document.querySelectorAll('.option-item').forEach(function (item) {
      item.addEventListener('click', function () {
        selectChoice(item.getAttribute('data-choice'));
      });
      item.addEventListener('keydown', function (event) {
        if (event.key === 'Enter' || event.key === ' ') {
          event.preventDefault();
          selectChoice(item.getAttribute('data-choice'));
        }
      });
    });

    document.getElementById('continue-btn').addEventListener('click', handleContinue);
    document.getElementById('lang-toggle').addEventListener('click', function () {
      applyLang(lang === 'ar' ? 'en' : 'ar');
    });

    lang = resolveLang();
    applyLang(lang);
  </script>
